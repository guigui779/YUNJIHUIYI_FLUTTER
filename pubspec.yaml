name: yunjihuiyi_meeting
description: 云际会议独立客户端
publish_to: 'none'

version: 1.12.3+17

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_background: ^1.1.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.0.7
  http: ^1.3.0
  google_fonts: ^6.2.1
  collection: '>=1.16.0'

  livekit_client: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.13

flutter_launcher_icons:
  android: "livekit_ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "images/yunjihuiyi-logo.png"
  adaptive_icon_foreground: "images/yunjihuiyi-logo.png"
  adaptive_icon_background: "#ffffff"

# The following section is specific to Flutter.
flutter:
  uses-material-design: true
  assets:
    - images/yunjihuiyi-logo.png
